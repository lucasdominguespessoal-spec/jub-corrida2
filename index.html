<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROTOCOLO DE TREINO - Painel Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="text"], input[type="email"], input[type="password"], textarea, select { font-size: 16px !important; }
    </style>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        onAuthStateChanged(auth, async (usuario) => {
            const painel = document.getElementById('app-root');
            if (usuario) {
                const EMAIL_PROFESSOR = 'lucasdominguespessoal@gmail.com';
                const isProf = (usuario.email.toLowerCase() === EMAIL_PROFESSOR.toLowerCase());
                let listaPlanilhas = [];

                if (!isProf) {
                    try {
                        const docRef = doc(db, "planilhas", usuario.email.toLowerCase().trim());
                        let docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            const dados = docSnap.data();
                            if (dados.semanas) {
                                listaPlanilhas = dados.semanas;
                            } else if (dados.dias) {
                                listaPlanilhas = [dados];
                            }
                        }
                    } catch (e) { console.error(e); }
                }

                const injetar = () => {
                    if (painel && painel.__x) {
                        painel.__x.$data.user = usuario;
                        painel.__x.$data.isProfessor = isProf;
                        painel.__x.$data.planilha = listaPlanilhas;
                        painel.__x.$data.inicializado = true;
                    } else { setTimeout(injetar, 100); }
                };
                injetar();
            } else {
                if (painel && painel.__x) {
                    painel.__x.$data.user = null;
                    painel.__x.$data.inicializado = true;
                }
            }
        });

        window.executarLoginNuvem = (email, senha) => signInWithEmailAndPassword(auth, email, senha);
        window.executarCadastroNuvem = (email, senha) => createUserWithEmailAndPassword(auth, email, senha);
        window.executarDesconexao = () => signOut(auth);
        
        window.salvarPlanilhaNuvem = async (atleta, dados) => {
            const ref = doc(db, "planilhas", atleta.toLowerCase().trim());
            const snap = await getDoc(ref);
            let atuais = [];
            if (snap.exists() && snap.data().semanas) {
                atuais = snap.data().semanas.filter(s => String(s.semana) !== String(dados.semana));
            }
            atuais.unshift(dados);
            return setDoc(ref, { semanas: atuais }, { merge: true });
        };
        
        window.salvarFeedbackNuvem = (diaId, dados) => setDoc(doc(db, "treinos_lucas", diaId), { ...dados, atualizadoEm: new Date().toISOString() }, { merge: true });
    </script>
</head>
<body class="min-h-screen pb-20 bg-neutral-950 text-neutral-50">

    <div id="app-root" x-data="{
        inicializado: false,
        user: null,
        isProfessor: false,
        authModo: 'login',
        email: '',
        senha: '',
        erroMsg: '',
        sucessoMsg: '',
        semanaAtiva: 0,
        planilha: [],
        diaAtivoIndex: 0,
        respostas: {},

        profAtleta: '', profSemana: '', profObjetivo: 'TAF 12 minutos', profPeriodo: '',
        profZonas: { Z1: '', Z2: '', Z3: '', Z4: '', Z5: '' },
        profDias: [
            { id: 'seg', nome: 'SEGUNDA', aquecimento: '', principal: '', desaquecimento: '' },
            { id: 'qua', nome: 'QUARTA', aquecimento: '', principal: '', desaquecimento: '' },
            { id: 'qui', nome: 'QUINTA', aquecimento: '', principal: '', desaquecimento: '' },
            { id: 'sab', nome: 'SÁBADO', aquecimento: '', principal: '', desaquecimento: '' }
        ],

        init() {
            const localFeed = localStorage.getItem('feedback_treinos_lucas');
            if (localFeed) this.respostas = JSON.parse(localFeed);
        },

        async gerenciarAuth() {
            this.erroMsg = ''; this.sucessoMsg = '';
            if (!this.email || !this.senha) { this.erroMsg = 'Preencha todos os campos.'; return; }
            try {
                if (this.authModo === 'login') {
                    await window.executarLoginNuvem(this.email, this.senha);
                } else {
                    await window.executarCadastroNuvem(this.email, this.senha);
                    this.sucessoMsg = 'Conta criada! Faça login.';
                    this.authModo = 'login';
                }
            } catch (err) { this.erroMsg = 'Falha no acesso.'; }
        },

        async publicarPlanilha() {
            this.erroMsg = ''; this.sucessoMsg = '';
            if (!this.profAtleta || !this.profSemana) { this.erroMsg = 'Campos obrigatórios ausentes.'; return; }
            try {
                const estrutura = {
                    semana: this.profSemana, atleta: this.profAtleta, objetivo: this.profObjetivo, periodo: this.profPeriodo, zonas: this.profZonas,
                    dias: this.profDias.map(d => ({ id: 's'+this.profSemana+'-'+d.id, nome: d.nome, aquecimento: d.aquecimento||'-', principal: d.principal||'Off', desaquecimento: d.desaquecimento||'-' }))
                };
                await window.salvarPlanilhaNuvem(this.profAtleta, estrutura);
                this.sucessoMsg = 'Planilha gravada!';
            } catch (e) { this.erroMsg = 'Erro ao salvar.'; }
        },

        toggleStatus(id, valor) {
            if (!this.respostas[id]) this.respostas[id] = { status: '' };
            this.respostas[id].status = (this.respostas[id].status === valor) ? '' : valor;
            localStorage.setItem('feedback_treinos_lucas', JSON.stringify(this.respostas));
            window.salvarFeedbackNuvem(id, this.respostas[id]);
        }
    }">

        <div x-show="!inicializado" class="fixed inset-0 bg-neutral-950 flex items-center justify-center z-50">
            <div class="w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <div x-show="inicializado" x-cloak>
            
            <div x-show="!user" class="w-full max-w-md mx-auto pt-20 px-4">
                <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl">
                    <div class="text-center mb-6">
                        <span class="text-[10px] font-black uppercase tracking-widest text-amber-500">SISTEMA DE CORRIDA</span>
                        <h2 class="text-2xl font-black tracking-tight mt-1" x-text="authModo === 'login' ? 'Entrar no Painel' : 'Criar Conta'"></h2>
                    </div>
                    <div class="space-y-4">
                        <input type="email" x-model="email" placeholder="E-mail" class="w-full bg-neutral-950 border border-neutral-800 py-3 px-4 rounded-xl text-white outline-none">
                        <input type="password" x-model="senha" placeholder="Senha" class="w-full bg-neutral-950 border border-neutral-800 py-3 px-4 rounded-xl text-white outline-none">
                        <div x-show="erroMsg" class="text-xs font-bold text-rose-500 bg-rose-500/10 p-3 rounded-xl" x-text="erroMsg"></div>
                        <div x-show="sucessoMsg" class="text-xs font-bold text-emerald-500 bg-emerald-500/10 p-3 rounded-xl" x-text="sucessoMsg"></div>
                        <button @click="gerenciarAuth()" class="w-full bg-amber-500 text-neutral-950 py-3.5 rounded-xl font-black text-xs uppercase tracking-widest cursor-pointer">Confirmar</button>
                        <button @click="authModo = (authModo === 'login' ? 'cadastro' : 'login')" class="w-full text-xs text-neutral-400 underline" x-text="authModo === 'login' ? 'Cadastre-se' : 'Fazer Login'"></button>
                    </div>
                </div>
            </div>

            <div x-show="user" x-cloak>
                <div class="w-full max-w-md mx-auto pt-4 px-4 flex justify-between items-center text-[10px] text-neutral-500 font-bold uppercase tracking-widest">
                    <span x-text="user?.email"></span>
                    <button @click="window.executarDesconexao()" class="text-rose-500 underline cursor-pointer">Sair</button>
                </div>

                <div x-show="isProfessor" class="w-full max-w-md mx-auto px-4 mt-4 space-y-4">
                    <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl">
                        <h2 class="text-xl font-black tracking-tight mb-4">Prescrever Planilha</h2>
                        <div class="space-y-4">
                            <input type="text" x-model="profAtleta" placeholder="E-mail do Aluno" class="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" x-model="profSemana" placeholder="Semana Nº" class="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs">
                                <input type="text" x-model="profPeriodo" placeholder="Período" class="w-full bg-neutral-950 border border-neutral-800 p-3 rounded-xl text-xs">
                            </div>
                            <template x-for="(dia, idx) in profDias" :key="idx">
                                <div class="p-3 bg-neutral-950 border border-neutral-800 rounded-xl space-y-2">
                                    <span class="font-black text-amber-500 text-[10px]" x-text="dia.nome"></span>
                                    <textarea placeholder="Treino Principal" x-model="dia.principal" class="w-full bg-neutral-900 p-2 rounded-lg text-[11px] resize-none outline-none"></textarea>
                                </div>
                            </template>
                            <button @click="publicarPlanilha()" class="w-full bg-emerald-500 text-neutral-950 py-3 rounded-xl font-black uppercase tracking-widest cursor-pointer">🚀 Publicar</button>
                        </div>
                    </div>
                </div>

                <div x-show="!isProfessor" class="w-full max-w-md mx-auto mt-2">
                    <div x-show="planilha.length === 0" class="px-4 pt-10 text-center text-xs text-neutral-500">Nenhum treino disponível.</div>
                    
                    <div x-show="planilha.length > 0">
                        <header class="px-4 pt-4">
                            <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 shadow-2xl">
                                <span class="text-[10px] font-black uppercase tracking-widest text-amber-500 block">📋 PROTOCOLO</span>
                                <div class="flex justify-between items-center mt-1">
                                    <h1 class="text-xl font-black tracking-tight truncate" x-text="'Semana ' + (planilha[semanaAtiva]?.semana || '1')"></h1>
                                    <select x-model="semanaAtiva" class="bg-neutral-800 border border-neutral-700 text-[10px] font-bold p-1 rounded-lg">
                                        <template x-for="(s, i) in planilha" :key="i">
                                            <option :value="i" x-text="'S' + s.semana"></option>
                                        </template>
                                    </select>
                                </div>
                                <div class="mt-2 text-xs font-bold text-neutral-400" x-text="planilha[semanaAtiva]?.periodo"></div>
                            </div>
                        </header>

                        <nav class="px-4 mt-3">
                            <div class="bg-neutral-900 border border-neutral-800 p-1.5 rounded-2xl flex gap-1">
                                <template x-for="(dia, index) in (planilha[semanaAtiva]?.dias || [])" :key="index">
                                    <button @click="diaAtivoIndex = index" :class="diaAtivoIndex === index ? 'bg-amber-500 text-neutral-950' : 'text-neutral-400'" class="flex-1 py-2.5 rounded-xl text-center text-[10px] font-black cursor-pointer">
                                        <span x-text="dia.nome.substring(0,3)"></span>
                                    </button>
                                </template>
                            </div>
                        </nav>

                        <main class="px-4 mt-3" x-show="planilha[semanaAtiva]?.dias">
                            <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-5 space-y-4">
                                <div class="p-4 bg-neutral-950 border border-neutral-800 rounded-2xl">
                                    <span class="text-[9px] text-amber-500 font-black uppercase">Treino</span>
                                    <p class="text-sm font-bold text-neutral-50" x-text="planilha[semanaAtiva].dias[diaAtivoIndex]?.principal || 'Off'"></p>
                                </div>

                                <div class="grid grid-cols-3 gap-2">
                                    <button @click="toggleStatus(planilha[semanaAtiva].dias[diaAtivoIndex]?.id, 'Feito')" :class="respostas[planilha[semanaAtiva].dias[diaAtivoIndex]?.id]?.status === 'Feito' ? 'bg-emerald-500 text-neutral-950' : 'bg-neutral-950'" class="py-2.5 rounded-xl text-[10px] font-black border border-neutral-800">Feito</button>
                                    <button @click="toggleStatus(planilha[semanaAtiva].dias[diaAtivoIndex]?.id, 'Adaptei')" :class="respostas[planilha[semanaAtiva].dias[diaAtivoIndex]?.id]?.status === 'Adaptei' ? 'bg-amber-500 text-neutral-950' : 'bg-neutral-950'" class="py-2.5 rounded-xl text-[10px] font-black border border-neutral-800">Adaptei</button>
                                    <button @click="toggleStatus(planilha[semanaAtiva].dias[diaAtivoIndex]?.id, 'Off')" :class="respostas[planilha[semanaAtiva].dias[diaAtivoIndex]?.id]?.status === 'Off' ? 'bg-rose-500 text-white' : 'bg-neutral-950'" class="py-2.5 rounded-xl text-[10px] font-black border border-neutral-800">Off</button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
